services:
  - type: web
    name: xpath-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: true
      - key: JWT_ISSUER
        value: xpath-backend
      - key: JWT_AUDIENCE
        value: xpath-clients
      - key: JWT_EXPIRY
        value: 7d
      - key: PUBLIC_REGISTRATION_ENABLED
        value: false
      - key: HL7_MLLP_ENABLED
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: xpath-postgres
          property: connectionString
      - key: DATABASE_SSL_MODE
        value: require
      - key: POSTGRES_STATE_TABLE
        value: app_state
      - key: POSTGRES_STATE_ID
        value: primary
      - key: POSTGRES_EXTERNAL_HOST_SUFFIX
        value: oregon-postgres.render.com
      - key: HEALTH_DIAGNOSTICS_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://olyvia.xpath-labs.com,https://x-path.vercel.app,http://localhost:5173,http://localhost:3000
      - key: OCR_TESSERACT_BINARY
        value: tesseract
      - key: OCR_TESSERACT_LANG
        value: eng+fra
      - key: OCR_NATIVE_ENABLED
        value: true
      - key: OCR_MAX_PDF_PAGES
        value: 8
      - key: AI_PROVIDER
        value: ollama
      - key: AI_API_BASE_URL
        fromService:
          name: pathnovate-ollama
          type: pserv
          property: hostport
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: qwen2.5:1.5b
      - key: WHISPER_ENABLED
        value: false
      - key: WHISPER_COMMAND
        value: whisper
      - key: WHISPER_MODEL
        value: base
      - key: WHISPER_LANGUAGE
        value: en
      - key: WHISPER_TIMEOUT_MS
        value: 120000
      - key: WHISPER_MAX_AUDIO_BYTES
        value: 26214400
      - key: ORTHANC_BASE_URL
        sync: false
      - key: OHIF_VIEWER_URL
        sync: false
      - key: WSI_TILE_SERVER_URL
        sync: false
      - key: COUCHDB_URL
        sync: false
      - key: COUCHDB_DATABASE
        value: xpath_offline
      - key: DMS_STORAGE_PROVIDER
        value: local
      - key: DMS_LOCAL_STORAGE_PATH
        value: /app/storage/documents
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: MAVIANCE_ACCESS_TOKEN
        sync: false
      - key: MAVIANCE_ACCESS_SECRET
        sync: false
      - key: MAVIANCE_WEBHOOK_SECRET
        sync: false
      - key: LEICA_PROCESSOR_API_TOKEN
        sync: false
      - key: LEICA_PROCESSOR_WEBHOOK_SECRET
        sync: false
      - key: LEICA_STAINER_API_TOKEN
        sync: false
      - key: LEICA_STAINER_WEBHOOK_SECRET
        sync: false
      - key: ROCHE_SCANNER_API_TOKEN
        sync: false
      - key: ROCHE_SCANNER_WEBHOOK_SECRET
        sync: false
  - type: pserv
    name: pathnovate-ollama
    runtime: docker
    dockerfilePath: ollama/Dockerfile
    dockerContext: ollama
    plan: standard
    envVars:
      - key: OLLAMA_HOST
        value: 0.0.0.0:11434
      - key: OLLAMA_MODEL
        value: qwen2.5:1.5b
    disk:
      name: ollama-models
      mountPath: /root/.ollama
      sizeGB: 10
databases:
  - name: xpath-postgres
    databaseName: olyvia_lims
    user: olyvia
    plan: basic-256mb
