services:
  - type: web
    name: xpath-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.13.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: true
      - key: JWT_ISSUER
        value: xpath-backend
      - key: JWT_AUDIENCE
        value: xpath-clients
      - key: JWT_EXPIRY
        value: 7d
      - key: PUBLIC_REGISTRATION_ENABLED
        value: false
      - key: HL7_MLLP_ENABLED
        value: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_MODE
        value: require
      - key: POSTGRES_STATE_TABLE
        value: app_state
      - key: POSTGRES_STATE_ID
        value: primary
      - key: POSTGRES_EXTERNAL_HOST_SUFFIX
        value: oregon-postgres.render.com
      - key: HEALTH_DIAGNOSTICS_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://x-path.vercel.app,http://localhost:5173,http://localhost:3000
      - key: OCR_TESSERACT_BINARY
        value: tesseract
      - key: OCR_TESSERACT_LANG
        value: eng+fra
      - key: OCR_NATIVE_ENABLED
        value: true
      - key: OCR_MAX_PDF_PAGES
        value: 8
      - key: AI_PROVIDER
        value: local
      - key: AI_API_BASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: qwen2.5:1.5b
      - key: WHISPER_ENABLED
        sync: false
      - key: WHISPER_COMMAND
        value: whisper
      - key: WHISPER_MODEL
        value: base
      - key: WHISPER_LANGUAGE
        value: en
      - key: WHISPER_TIMEOUT_MS
        value: 120000
      - key: WHISPER_MAX_AUDIO_BYTES
        value: 26214400
      - key: ORTHANC_BASE_URL
        sync: false
      - key: OHIF_VIEWER_URL
        sync: false
      - key: WSI_TILE_SERVER_URL
        sync: false
      - key: COUCHDB_URL
        sync: false
      - key: COUCHDB_DATABASE
        value: xpath_offline
      - key: DMS_STORAGE_PROVIDER
        sync: false
      - key: DMS_LOCAL_STORAGE_PATH
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: MAVIANCE_ACCESS_TOKEN
        sync: false
      - key: MAVIANCE_ACCESS_SECRET
        sync: false
      - key: MAVIANCE_WEBHOOK_SECRET
        sync: false
      - key: LEICA_PROCESSOR_API_TOKEN
        sync: false
      - key: LEICA_PROCESSOR_WEBHOOK_SECRET
        sync: false
      - key: LEICA_STAINER_API_TOKEN
        sync: false
      - key: LEICA_STAINER_WEBHOOK_SECRET
        sync: false
      - key: ROCHE_SCANNER_API_TOKEN
        sync: false
      - key: ROCHE_SCANNER_WEBHOOK_SECRET
        sync: false
